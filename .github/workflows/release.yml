name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to verify or publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: kanatoko-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  RUST_BACKTRACE: "1"
  RUST_TOOLCHAIN: "1.91.0"

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.release.outputs.commit_sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out the tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Install Rust
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" \
            --profile minimal \
            --component clippy \
            --component rustfmt
          rustup default "${RUST_TOOLCHAIN}"

      - name: Verify release line and resolved runtime
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must have the form vMAJOR.MINOR.PATCH: ${tag}" >&2
            exit 1
          fi

          package_metadata="$(cargo metadata --locked --no-deps --format-version 1)"
          version="$(
            jq -er '.packages[] | select(.name == "kanatoko") | .version' \
              <<<"${package_metadata}"
          )"
          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi

          if [[ "${version}" == "0.1.0" ]]; then
            sdk_major="27"
            release_branch="master"
          else
            sdk_major="${version%%.*}"
            case "${sdk_major}" in
              25|26|27) ;;
              *)
                echo "Unsupported Kanatoko release major: ${sdk_major}" >&2
                exit 1
                ;;
            esac
            release_branch="sdk-${sdk_major}"
          fi

          expected_requirement="^${sdk_major}"
          for dependency in \
            soroban-env-host \
            soroban-ledger-snapshot \
            soroban-sdk
          do
            mapfile -t requirements < <(
              jq -r --arg dependency "${dependency}" '
                .packages[]
                | select(.name == "kanatoko")
                | .dependencies[]
                | select(.name == $dependency)
                | .req
              ' <<<"${package_metadata}"
            )
            if [[ "${#requirements[@]}" -ne 1 ]]; then
              echo "Expected one direct ${dependency} dependency" >&2
              exit 1
            fi
            if [[ "${requirements[0]}" != "${expected_requirement}" ]]; then
              echo \
                "${dependency} must use broad major ${sdk_major}, found ${requirements[0]}" \
                >&2
              exit 1
            fi
          done

          locked_metadata="$(cargo metadata --locked --format-version 1)"
          for dependency in \
            soroban-env-host \
            soroban-ledger-snapshot \
            soroban-sdk
          do
            mapfile -t versions < <(
              jq -r --arg dependency "${dependency}" '
                .packages[]
                | select(.name == $dependency)
                | .version
              ' <<<"${locked_metadata}" |
                sort -u
            )
            if [[ "${#versions[@]}" -ne 1 ]]; then
              echo \
                "Expected one resolved ${dependency} version, found: ${versions[*]:-none}" \
                >&2
              exit 1
            fi
            if [[ "${versions[0]%%.*}" != "${sdk_major}" ]]; then
              echo \
                "${dependency} resolved to ${versions[0]}, expected major ${sdk_major}" \
                >&2
              exit 1
            fi
          done

          git fetch --no-tags origin \
            "refs/heads/${release_branch}:refs/remotes/origin/${release_branch}"
          tag_commit="$(
            git rev-parse --verify "refs/tags/${tag}^{commit}"
          )"
          if ! git merge-base --is-ancestor \
            "${tag_commit}" "origin/${release_branch}"
          then
            echo \
              "Tag ${tag} is not attached to a commit on origin/${release_branch}" \
              >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${tag_commit}" >> "${GITHUB_OUTPUT}"
          echo "sdk_major=${sdk_major}" >> "${GITHUB_OUTPUT}"
          echo "release_branch=${release_branch}" >> "${GITHUB_OUTPUT}"

      - name: Check a fresh same-major resolution
        shell: bash
        env:
          SDK_MAJOR: ${{ steps.release.outputs.sdk_major }}
        run: |
          set -euo pipefail

          fresh_source="$(
            mktemp -d "${RUNNER_TEMP}/kanatoko-fresh-source.XXXXXX"
          )"
          fresh_target="$(
            mktemp -d "${RUNNER_TEMP}/kanatoko-fresh-target.XXXXXX"
          )"
          cleanup() {
            rm -rf -- "${fresh_source}" "${fresh_target}"
          }
          trap cleanup EXIT

          git archive --format=tar HEAD | tar -xf - -C "${fresh_source}"
          rm -f -- "${fresh_source}/Cargo.lock"

          CARGO_TARGET_DIR="${fresh_target}" cargo check \
            --manifest-path "${fresh_source}/Cargo.toml" \
            --all-targets \
            --all-features

          fresh_metadata="$(
            cargo metadata \
              --manifest-path "${fresh_source}/Cargo.toml" \
              --locked \
              --format-version 1
          )"
          for dependency in \
            soroban-env-host \
            soroban-ledger-snapshot \
            soroban-sdk
          do
            mapfile -t versions < <(
              jq -r --arg dependency "${dependency}" '
                .packages[]
                | select(.name == $dependency)
                | .version
              ' <<<"${fresh_metadata}" |
                sort -u
            )
            if [[ "${#versions[@]}" -ne 1 ]]; then
              echo \
                "Fresh resolution has multiple ${dependency} versions: ${versions[*]:-none}" \
                >&2
              exit 1
            fi
            if [[ "${versions[0]%%.*}" != "${SDK_MAJOR}" ]]; then
              echo \
                "Fresh ${dependency} ${versions[0]} does not match major ${SDK_MAJOR}" \
                >&2
              exit 1
            fi
          done

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run default-feature tests
        run: cargo test --locked

      - name: Run all-feature tests
        run: cargo test --locked --all-features

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --all-features --no-deps

      - name: Verify the crates.io package
        run: cargo publish --locked --dry-run

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    outputs:
      crate_checksum: ${{ steps.registry_readback.outputs.crate_checksum }}
    steps:
      - name: Select crates.io authentication mode
        id: auth_mode
        shell: bash
        env:
          BOOTSTRAP_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -n "${BOOTSTRAP_TOKEN}" ]]; then
            echo "bootstrap=true" >> "${GITHUB_OUTPUT}"
          else
            echo "bootstrap=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out the tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.commit_sha }}

      - name: Verify the release tag did not move
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.verify.outputs.commit_sha }}
        run: |
          set -euo pipefail

          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          actual_commit="$(
            git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}"
          )"
          if [[ "${actual_commit}" != "${EXPECTED_COMMIT}" ]]; then
            echo "Release tag ${RELEASE_TAG} moved after verification" >&2
            exit 1
          fi

      - name: Install Rust
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup default "${RUST_TOOLCHAIN}"

      - name: Build the crate archive
        run: cargo package --locked

      - name: Check for an existing crates.io version
        id: registry
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail

          crate="target/package/kanatoko-${VERSION}.crate"
          local_checksum="$(sha256sum "${crate}" | cut -d ' ' -f 1)"
          response="${RUNNER_TEMP}/crates-io-version.json"
          status="$(
            curl --silent --show-error --location \
              --header "User-Agent: kanatoko-release-workflow (github.com/roman-karpovich/kanatoko)" \
              --output "${response}" \
              --write-out "%{http_code}" \
              "https://crates.io/api/v1/crates/kanatoko/${VERSION}"
          )"

          case "${status}" in
            200)
              remote_checksum="$(jq -er '.version.checksum' "${response}")"
              if [[ "${remote_checksum}" != "${local_checksum}" ]]; then
                echo "kanatoko ${VERSION} exists with a different checksum" >&2
                exit 1
              fi
              echo "kanatoko ${VERSION} already exists with the same checksum"
              echo "exists=true" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo "exists=false" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "crates.io returned HTTP ${status}" >&2
              exit 1
              ;;
          esac

          echo "local_checksum=${local_checksum}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate with crates.io trusted publishing
        id: crates_io_auth
        if: >-
          steps.registry.outputs.exists == 'false' &&
          steps.auth_mode.outputs.bootstrap == 'false'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish with the bootstrap token
        if: >-
          steps.registry.outputs.exists == 'false' &&
          steps.auth_mode.outputs.bootstrap == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --no-verify

      - name: Publish with trusted publishing
        if: >-
          steps.registry.outputs.exists == 'false' &&
          steps.auth_mode.outputs.bootstrap == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: cargo publish --locked --no-verify

      - name: Verify crates.io checksum
        id: registry_readback
        shell: bash
        env:
          EXPECTED_CHECKSUM: ${{ steps.registry.outputs.local_checksum }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail

          response="${RUNNER_TEMP}/crates-io-readback.json"
          for attempt in $(seq 1 24); do
            status="$(
              curl --silent --show-error --location \
                --header "User-Agent: kanatoko-release-workflow (github.com/roman-karpovich/kanatoko)" \
                --output "${response}" \
                --write-out "%{http_code}" \
                "https://crates.io/api/v1/crates/kanatoko/${VERSION}"
            )"
            if [[ "${status}" == "200" ]]; then
              remote_checksum="$(jq -er '.version.checksum' "${response}")"
              if [[ "${remote_checksum}" != "${EXPECTED_CHECKSUM}" ]]; then
                echo "Published checksum does not match the local crate archive" >&2
                exit 1
              fi
              echo "crate_checksum=${remote_checksum}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 5
          done

          echo "kanatoko ${VERSION} was not visible on crates.io after 120 seconds" >&2
          exit 1

  github-release:
    name: Create GitHub release
    needs:
      - verify
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.commit_sha }}

      - name: Create the release
        env:
          EXPECTED_COMMIT: ${{ needs.verify.outputs.commit_sha }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --no-tags origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          actual_commit="$(
            git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}"
          )"
          if [[ "${actual_commit}" != "${EXPECTED_COMMIT}" ]]; then
            echo "Release tag ${RELEASE_TAG} moved after publication" >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists"
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
